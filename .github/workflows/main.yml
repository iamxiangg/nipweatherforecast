name: 15-Min Weather Watcher

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Required to allow GitHub to push the file change back to your repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: python weather_bot.py

      - name: Commit and push if weather changed
        run: |
          git config --global user.name "Weather-Bot-Action"
          git config --global user.email "actions@github.com"
          git add last_weather.txt
          # Only commit if there are changes to the file
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update weather state" && git push)
