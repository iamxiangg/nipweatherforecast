name: Weather Bot Monitor

on:
  repository_dispatch:
    types: [check_weather_interval, force_weather_update]
  workflow_dispatch: # Scenario 2: Enable manual button

jobs:
  check-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Weather Bot
        id: weather_script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: |
          # Check if external cron sent 'force_weather_update' OR user clicked 'workflow_dispatch'
          if [ "${{ github.event.action }}" == "force_weather_update" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Forcing update (Scenario 2 or 3)..."
            OUTPUT=$(python weather_bot.py --force)
          else
            echo "Checking for changes (Scenario 1)..."
            OUTPUT=$(python weather_bot.py)
          fi
          
          echo "$OUTPUT"
          
          if [[ "$OUTPUT" == *"CHANGE_DETECTED=true"* ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Save Weather State
        if: steps.weather_script.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_weather.txt
          git commit -m "Update weather state: $(date +'%Y-%m-%d %H:%M SGT')"
          git push