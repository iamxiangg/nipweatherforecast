name: Weather Bot Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '30 23 * * *'
  workflow_dispatch: # Scenario 2: Enable manual button

jobs:
  check-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Weather Bot
        id: weather_script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: |
          CURRENT_TIME=$(date +%H%M)
          
          # Logic: Use --force if it's 07:30 SGT (Scenario 3) OR Manual Dispatch (Scenario 2)
          if [ "$CURRENT_TIME" == "2330" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Forcing update (Scenario 2 or 3)..."
            OUTPUT=$(python weather_bot.py --force)
          else
            echo "Checking for changes (Scenario 1)..."
            OUTPUT=$(python weather_bot.py)
          fi
          
          echo "$OUTPUT"
          
          if [[ "$OUTPUT" == *"CHANGE_DETECTED=true"* ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Save Weather State
        if: steps.weather_script.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add last_weather.txt
          git commit -m "Update weather state: $(date +'%Y-%m-%d %H:%M SGT')"
          git push
