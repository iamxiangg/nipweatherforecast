name: Weather Bot Monitor

on:
  schedule:
    # ⏱️ Triggers natively every 10 minutes inside the main branch context
    - cron: '*/10 * * * *'
  workflow_dispatch: # Scenario 3: Keeps manual override option available

jobs:
  check-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      # 💾 RESTORE CACHE: Works flawlessly now because it runs natively on 'main'
      - name: Restore Weather Cache
        id: cache_restore
        uses: actions/cache/restore@v4
        with:
          path: last_weather.txt
          key: weather-cache-key

      - name: Run Weather Bot
        id: weather_script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: |
          # Detect manual button vs automated schedule checks
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Forcing updates (Manual Override)..."
            OUTPUT=$(python weather_bot.py --force)
          else
            echo "Running normal interval change check..."
            OUTPUT=$(python weather_bot.py)
          fi
          
          echo "$OUTPUT"
          
          if [[ "$OUTPUT" == *"CHANGE_DETECTED=true"* ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 💾 SAVE CACHE: Only updates when something meaningful happens
      - name: Save Weather State Cache
        if: steps.weather_script.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: last_weather.txt
          key: weather-cache-key
