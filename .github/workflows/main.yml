name: Weather Bot Monitor

on:
  repository_dispatch:
    types: [check_weather_interval, force_weather_update]
  workflow_dispatch:

jobs:
  check-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🔐 Grants permission to save the updated text file back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Pulls down your code along with your existing last_weather.txt file

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Weather Bot
        id: weather_script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_IDS: ${{ secrets.CHAT_IDS }}
        run: |
          if [ "${{ github.event.action }}" == "force_weather_update" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Forcing update..."
            OUTPUT=$(python weather_bot.py --force)
          else
            echo "Checking for changes..."
            OUTPUT=$(python weather_bot.py)
          fi
          
          echo "$OUTPUT"
          
          if [[ "$OUTPUT" == *"CHANGE_DETECTED=true"* ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 🔐 FIX: Instead of cache, commit the modified last_weather.txt back into your repository
      - name: Commit and Push Weather State Changes
        if: steps.weather_script.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last_weather.txt
          git commit -m "chore: update weather state tracking snapshot [skip ci]"
          git push
